<div class="py-4">

  <div class="flex-1 flex flex-col items-center justify-center px-4 text-center">
    <h2 class="heading-primary mb-6">
      {{ 'nav.listLines' | translate }}
    </h2>
  </div>

  <div class="flex-1 flex flex-col items-center justify-start px-4">
    <div class="w-full max-w-md space-y-2">
      @if (listLines && listLines.length > 0) {
      <div class="space-y-2">
        @for (line of listLines; track $index) {
        <a [href]="getLineUrl(line.file)" target="_blank" rel="noopener noreferrer"
          class="btn-line-selector-extended flex items-center gap-3">
          <span class="text-lg">📄</span>
          <span class="text-sm text-left text-primary-var">
            {{ line.name }}
          </span>
        </a>
        }
      </div>
      } @else {
      <div class="empty-state">
        <svg class="empty-state-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z" />
        </svg>
        <p class="empty-state-text">Nessun documento disponibile</p>
      </div>
      }
    </div>
  </div>
</div>
