<div class="pb-4 px-4">
  <app-navbar />

  <div class="flex-1 flex flex-col items-center justify-center px-4 text-center">
    <h2 class="text-2xl font-semibold text-slate-100 mb-6">
      {{ 'nav.listLines' | translate }}
    </h2>
  </div>

  <div class="flex-1 flex flex-col items-center justify-start px-4">
    <div class="w-full max-w-md space-y-2">
      @for (line of listLines; track $index) {
      <a [href]="getLineUrl(line.file)" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3 p-3 rounded-xl
                 bg-slate-800 border border-slate-700
                 text-sky-400 hover:text-sky-300
                 hover:bg-slate-700 hover:border-sky-400
                 transition-colors">
        <span class="text-lg">📄</span>
        <span class="text-sm text-left text-slate-100">
          {{ line.name }}
        </span>
      </a>
      }
    </div>
  </div>
</div>
