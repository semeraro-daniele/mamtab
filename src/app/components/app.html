<main class="min-h-screen pb-16 bg-base-var">
  <router-outlet />
</main>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 z-50
      backdrop-blur flex items-stretch h-16 nav-bg-mix border-top-default">

  <!-- Home -->
  <a routerLink="/homepage" (click)="infoMenuOpen = false" class="bottom-nav-item"
    [ngClass]="isActive('/homepage') ? 'bottom-nav-active' : 'bottom-nav-inactive'">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
    </svg>
    <span class="bottom-nav-label">{{ 'nav.homepage' | translate }}</span>
  </a>

  <!-- Fermata -->
  <a routerLink="/stop" (click)="infoMenuOpen = false" class="bottom-nav-item"
    [ngClass]="isActive('/stop') ? 'bottom-nav-active' : 'bottom-nav-inactive'">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
    </svg>
    <span class="bottom-nav-label">{{ 'nav.searchByStop' | translate }}</span>
  </a>

  <!-- Linea -->
  <a routerLink="/line" (click)="infoMenuOpen = false" class="bottom-nav-item"
    [ngClass]="isActive('/line') ? 'bottom-nav-active' : 'bottom-nav-inactive'">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
    </svg>
    <span class="bottom-nav-label">{{ 'nav.searchByLine' | translate }}</span>
  </a>

  <!-- Info -->
  <button (click)="toggleInfoMenu()" class="bottom-nav-item relative" [ngClass]="isActive('/info') || isActive('/list-lines') || infoMenuOpen
      ? 'bottom-nav-active' : 'bottom-nav-inactive'">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span class="bottom-nav-label">{{ 'homepage.info' | translate }}</span>
  </button>

</nav>

<!-- Info / Impostazioni popup -->
@if (infoMenuOpen) {
<div class="fixed inset-0 z-40" (click)="infoMenuOpen = false">
  <div class="absolute bottom-16 left-0 right-0 rounded-t-2xl shadow-2xl px-4 py-5 popup-surface border-top-default"
    (click)="$event.stopPropagation()">

    <!-- Handle -->
    <div class="w-10 h-1 rounded-full mx-auto mb-5 handle-bg-default"></div>

    <!-- Info page link -->
    <a routerLink="/info" (click)="infoMenuOpen = false" class="menu-item menu-item-inactive mb-1">
      <svg class="w-5 h-5 shrink-0 svg-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-sm font-medium">{{ 'homepage.info' | translate }}</span>
    </a>

    <!-- Elenco linee -->
    <a routerLink="/list-lines" (click)="infoMenuOpen = false" class="menu-item menu-item-inactive mb-1">
      <svg class="w-5 h-5 shrink-0 svg-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
      </svg>
      <span class="text-sm font-medium">{{ 'nav.listLines' | translate }}</span>
    </a>

    <!-- Divider -->
    <div class="my-3 border-top-default"></div>

    <!-- Tema -->
    <p class="section-label px-3 mb-2">{{ 'theme.label' | translate }}</p>
    <div class="flex gap-2 px-3 mb-4">
      <button (click)="changeTheme('light')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold cursor-pointer transition-all"
        [ngClass]="currentTheme === 'light' ? 'accent-bg' : 'bg-raised-var text-secondary-var'">
        {{ 'theme.light' | translate }}
      </button>
      <button (click)="changeTheme('dark')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold cursor-pointer transition-all"
        [ngClass]="currentTheme === 'dark' ? 'accent-bg' : 'bg-raised-var text-secondary-var'">
        {{ 'theme.dark' | translate }}
      </button>
    </div>

    <!-- Lingua -->
    <p class="section-label px-3 mb-2">{{ 'lang.language' | translate }}</p>
    <div class="flex gap-2 px-3">
      <button (click)="changeLanguage('it')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold cursor-pointer transition-all"
        [ngClass]="currentLanguage === 'it' ? 'accent-bg' : 'bg-raised-var text-secondary-var'">
        {{ 'lang.it' | translate }}
      </button>
      <button (click)="changeLanguage('en')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold cursor-pointer transition-all"
        [ngClass]="currentLanguage === 'en' ? 'accent-bg' : 'bg-raised-var text-secondary-var'">
        {{ 'lang.en' | translate }}
      </button>
    </div>

  </div>
</div>
}
